<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project CLASSIFIED</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="board">

    <div class="airport">
        SOF
    </div>

    <div class="line"></div>

    <div class="row">
        <span>Flight</span>
        <span>
            <b>
                <span id="flight-prefix">W6</span>
                <span id="flight-number"> ████</span>
            </b>
        </span>
    </div>

    <div class="row">
        <span>Departure</span>
        <span><b>13:00</b></span>
    </div>

    <div class="row">
        <span>Destination</span>
        <span id="destination">██████████</span>
    </div>

    <div class="row">
        <span style="min-width:90px;">Status</span>
        <span id="status">CLASSIFIED</span>
    </div>

    <div class="line"></div>

    <div class="announcement">

        <div class="small">
            NEXT ANNOUNCEMENT
        </div>

        <div class="date">
            24 JUL 2026
        </div>

        <div class="time">
            14:30 LOCAL TIME
        </div>

    </div>

    <div id="countdown" class="countdown"></div>

    <div id="routes" class="routes" style="display:none;">

        <div class="routes-title">

            Available exits

        </div>

        <div id="route-ch">

            Switzerland

        </div>

        <div id="route-fr">

            France

        </div>

        <div id="route-de">

            Germany

        </div>

    </div>

</div>


<div id="final" style="display:none;">

    <h1>

        Честит рожден ден, Свилче!

    </h1>

    <h2>

        Отиваме на приключение:

    </h2>

    <img
        src="img/itinerary.jpg"
        id="itinerary"
        alt="Програма">

</div>

<script src="js/script.js"></script>

</body>
</html>
